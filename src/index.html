<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gaslightCTF</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link id="favicon" rel="shortcut icon" href="https://gaslightctf.cooking/assets/gaslighticoncolor.png" />
    <script>
      (function () {
        let theme = localStorage.getItem("theme");
        if (!theme || theme === "auto") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-bs-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div data-bs-theme="dark"><!-- force dark tokens to be inlined as critical css --></div>
    <app-root class="d-flex flex-column min-vh-100">
        <header class="py-3">
          <div class="container">
            <div class="d-flex align-items-center gap-2 placeholder-glow py-2">
              <img src="https://gaslightctf.cooking/assets/gaslighticoncolor.png" width="32" height="32" alt="" style="flex-shrink:0;" />
              <span class="placeholder rounded" style="width:44px;"></span>
              <span class="placeholder rounded" style="width:76px;"></span>
              <span class="placeholder rounded" style="width:42px;"></span>
              <span class="placeholder rounded" style="width:56px;"></span>
              <span class="placeholder rounded" style="width:80px;"></span>
              <span class="placeholder rounded ms-auto" style="width:100px;"></span>
              <span class="placeholder rounded-circle" style="width:18px;height:18px;"></span>
            </div>
          </div>
        </header>
        <main class="flex-grow-1">
          <div class="container placeholder-glow">
            <h1><span class="placeholder rounded col-2"></span></h1>
            <span class="placeholder rounded col-3"></span>
          </div>
        </main>
        <div class="container">
          <footer class="d-flex justify-content-between py-3 my-4 border-top placeholder-glow">
            <span class="placeholder rounded" style="width:130px;"></span>
            <span class="placeholder rounded" style="width:110px;"></span>
          </footer>
        </div>
    </app-root>
  </body>
</html>
