<h1>Profile settings</h1>
<p>Manage your account.</p>
<div class="card">
  <div class="card-body">
    <h4>Danger zone</h4>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteAccount"><i class="bi bi-trash text-info"></i>&nbsp;Delete account</button>
    <div class="modal" tabindex="-1" id="deleteAccount">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Delete account</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>Please note that this action is irriversibe and will remove all of your account data.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" (click)="deleteAccount()" data-bs-dismiss="modal"><i class="bi bi-trash text-white"></i>Delete account</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
